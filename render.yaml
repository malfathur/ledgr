services:
  - type: web
    name: ledgr
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ROOT_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
